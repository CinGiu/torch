services:
  torch:
    build: .
    restart: unless-stopped
    ports:
      - "9094:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - CONFIG_PATH=/data/config.json
      - KEEP_WORKSPACE=true
      - LOG_LEVEL=debug
      - ADMIN_EMAIL=giulio.cinelli@cubbit.io   # your Cubbit email — unlocks the Admin tab
      - ALLOWED_DOMAIN=cubbit.io               # restrict login to this domain; leave empty to allow any Cubbit account
    volumes:
      - ./data:/data
      - ./workspaces:/workspaces
      - ~/.claude:/root/.claude:ro

      # ── SDK mounts ────────────────────────────────────────────────────────
      # Mount any SDK from the host and expose it to agents via PATH.
      # Configure PATH in the dashboard: Settings → Agent Environment → PATH.
      #
      # Flutter:
      #   - ~/flutter:/opt/flutter
      #   PATH entry: /opt/flutter/bin:/opt/flutter/bin/cache/dart-sdk/bin
      #   Extra volume for pub cache (optional but speeds up runs):
      #   - flutter_pub_cache:/root/.pub-cache
      #
      # Go:
      #   - ~/go:/usr/local/go
      #   PATH entry: /usr/local/go/bin
      #
      # Python (pyenv):
      #   - ~/.pyenv:/root/.pyenv
      #   PATH entry: /root/.pyenv/shims:/root/.pyenv/bin
      #
      # Node (custom version):
      #   - ~/.nvm:/root/.nvm
      #   PATH entry: /root/.nvm/versions/node/v22.0.0/bin

    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  # flutter_pub_cache:   # uncomment if using Flutter
