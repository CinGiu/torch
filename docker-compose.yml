services:
  torch:
    build: .
    restart: unless-stopped
    ports:
      - "9094:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - CONFIG_PATH=/data/config.json
      - KEEP_WORKSPACE=true
      - LOG_LEVEL=debug
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ALLOWED_DOMAIN=${ALLOWED_DOMAIN}
    volumes:
      - ./data:/data
      - ./workspaces:/workspaces
      - ~/.claude:/root/.claude

      # ── SDK mounts ────────────────────────────────────────────────────────
      # To add an SDK: uncomment the volume below, restart the stack, then
      # go to Settings → SDKs and enable the SDK with one click.
      #
      # Flutter:   - ~/flutter:/opt/flutter:ro
      # Go:        - ~/go:/usr/local/go:ro
      # Python:    - ~/.pyenv:/root/.pyenv:ro
      # Rust:      - ~/.cargo:/root/.cargo:ro   # warning: exposes credentials.toml
      #            - ~/.rustup:/root/.rustup:ro
      # Ruby:      - ~/.rbenv:/root/.rbenv:ro
      # Java:      - ~/.sdkman:/root/.sdkman:ro
      # Node(nvm): - ~/.nvm:/root/.nvm:ro
      #              (set PATH manually: /root/.nvm/versions/node/vX.Y.Z/bin)

    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  # flutter_pub_cache:   # uncomment if using Flutter
