services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - torch

  torch:
    build: .
    restart: unless-stopped
    # No longer exposed directly — Caddy proxies to it
    environment:
      - REDIS_ADDR=redis:6379
      - CONFIG_PATH=/data/config.json
      - KEEP_WORKSPACE=true
      - LOG_LEVEL=debug
    volumes:
      - ./data:/data
      - ./workspaces:/workspaces
      - flutter_pub_cache:/root/.pub-cache
      - ~/.claude:/root/.claude:ro
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  redis_data:
  flutter_pub_cache:
  caddy_data:
  caddy_config:
